services:
  - type: web
    name: youtube-rag-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: EMBEDDER_BACKEND
        value: voyage
      - key: RERANKER_BACKEND
        value: voyage
      - key: TRANSFORMERS_OFFLINE
        value: "0"
      - key: HF_HUB_OFFLINE
        value: "0"