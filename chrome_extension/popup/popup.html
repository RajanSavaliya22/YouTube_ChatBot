<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube RAG Chatbot</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2f7;
      --text2: #8b92a5;
      --accent: #ff4b4b;
      --green: #22c97a;
      --red: #ff5c5c;
      --font: -apple-system, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 6px;
      flex-shrink: 0;
    }
    h1 {
      font-size: 14px;
      margin: 0;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 4px;
      margin-top: 12px;
      letter-spacing: 0.2px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: monospace;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
    }
    .toggle-row span {
      font-size: 12px;
      color: var(--text);
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: 0.15s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 2px; top: 2px;
      background: var(--text2);
      border-radius: 50%;
      transition: 0.15s;
    }
    .switch input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent);
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
      background: white;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text2);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text2);
      flex-shrink: 0;
    }
    .dot.ok { background: var(--green); }
    .dot.err { background: var(--red); }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
    }
    button:hover { border-color: var(--accent); }
    .saved-msg {
      font-size: 11px;
      color: var(--green);
      margin-top: 8px;
      min-height: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>YouTube RAG Chatbot</h1>
  </div>

  <label for="apiUrl">API Base URL</label>
  <input type="text" id="apiUrl" placeholder="https://your-api.onrender.com" />

  <label for="apiKey">API Key (optional)</label>
  <input type="password" id="apiKey" placeholder="Leave blank if not required" />

  <div class="toggle-row">
    <span>Auto-index on video load</span>
    <label class="switch">
      <input type="checkbox" id="autoIndex" checked />
      <span class="slider"></span>
    </label>
  </div>

  <button id="checkHealthBtn">Check API Connection</button>
  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Not checked yet</span>
  </div>

  <div class="saved-msg" id="savedMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
